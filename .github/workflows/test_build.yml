name: Test Build (Artifacts Only)

on:
  workflow_dispatch:
    inputs:
      appName:
        description: 'App Name (测试应用名称)'
        required: true
        default: '天阙测试'
      binaryName:
        description: 'Binary Name (测试文件名)'
        required: true
        default: 'TianQueTest'
      buildAndroid:
        description: '编译 Android'
        type: boolean
        default: true
      buildWindows:
        description: '编译 Windows'
        type: boolean
        default: true
      buildMacOS:
        description: '编译 macOS'
        type: boolean
        default: false
      buildLinux:
        description: '编译 Linux'
        type: boolean
        default: false

jobs:
  build-android:
    name: Android Build
    if: ${{ github.event.inputs.buildAndroid == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: wangn9900/MOMclash
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
          ref: main

      - name: Setup Environment
        uses: actions/setup-java@v4
        with: {distribution: 'zulu', java-version: '17'}
      - uses: actions/setup-go@v5
        with: {go-version: '1.24.0'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
          
      - name: Setup Android Signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/local.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties
          fi

      - name: Build
        run: |
          # 1. 先给插件生成代码
          cd plugins/chatwoot_sdk
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          cd ../..
          
          # 2. 根目录常规操作
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          dart run scripts/update_oem.dart --appName="${{ github.event.inputs.appName }}" --binaryName="${{ github.event.inputs.binaryName }}" --packageName="com.tianque.app" --ossUrl="https://example.com" --imgbbApiKey="test"
          dart setup.dart android --out core
          flutter build apk --release --split-per-abi --android-skip-build-dependency-validation
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Android-Test-Build
          path: build/app/outputs/flutter-apk/*.apk

  build-windows:
    name: Windows Build
    if: ${{ github.event.inputs.buildWindows == 'true' }}
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          repository: wangn9900/MOMclash
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
          ref: main
      
      - uses: actions/setup-go@v5
        with: {go-version: '1.24.0'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
          
      - name: Build
        run: |
          # 1. 先给插件生成代码
          cd plugins/chatwoot_sdk
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          cd ../..
          
          # 2. 根目录常规操作
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          dart run scripts/update_oem.dart --appName="${{ github.event.inputs.appName }}" --binaryName="${{ github.event.inputs.binaryName }}" --packageName="com.tianque.app" --ossUrl="https://example.com" --imgbbApiKey="test"
          dart setup.dart windows --arch amd64 --env stable
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Test-Build
          path: |
            *.zip
            *.exe

  build-macos:
    name: macOS Build
    if: ${{ github.event.inputs.buildMacOS == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: wangn9900/MOMclash
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
          ref: main
      
      - uses: actions/setup-go@v5
        with: {go-version: '1.24.0'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
          
      - name: Build
        run: |
          # 1. 先给插件生成代码
          cd plugins/chatwoot_sdk
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          cd ../..
          
          # 2. 根目录常规操作
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          dart run scripts/update_oem.dart --appName="${{ github.event.inputs.appName }}" --binaryName="${{ github.event.inputs.binaryName }}" --packageName="com.tianque.app" --ossUrl="https://example.com" --imgbbApiKey="test"
          
          # Build arm64
          dart setup.dart macos --out core --arch arm64
          # 直接在全项目根目录搜，我看你还能往哪躲
          mkdir -p libclash/macos
          CORE_PATH=$(find . -name "TianQueCore" | head -n 1)
          echo "Found Core at: $CORE_PATH"
          mkdir -p libclash/macos
          cp "$CORE_PATH" libclash/macos/TianQueCore
          chmod +x libclash/macos/TianQueCore
          flutter build macos --release
          cd build/macos/Build/Products/Release
          hdiutil create -volname "${{ github.event.inputs.binaryName }}" -srcfolder "$(ls -d *.app)" -ov -format UDZO "Test-macOS-arm64.dmg"
          mv "Test-macOS-arm64.dmg" ../../../../../
          
          # Build amd64
          cd ../../../../../
          flutter clean
          flutter pub get
          dart setup.dart macos --out core --arch amd64
          CORE_PATH_AMD=$(find . -name "TianQueCore" | head -n 1)
          echo "Found Core at: $CORE_PATH_AMD"
          cp "$CORE_PATH_AMD" libclash/macos/TianQueCore
          chmod +x libclash/macos/TianQueCore
          flutter build macos --release
          cd build/macos/Build/Products/Release
          hdiutil create -volname "${{ github.event.inputs.binaryName }}" -srcfolder "$(ls -d *.app)" -ov -format UDZO "Test-macOS-amd64.dmg"
          mv "Test-macOS-amd64.dmg" ../../../../../
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Test-Build
          path: |
            Test-macOS-arm64.dmg
            Test-macOS-amd64.dmg

  build-linux:
    name: Linux Build
    if: ${{ github.event.inputs.buildLinux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: wangn9900/MOMclash
          token: ${{ secrets.ACCESS_TOKEN }}
          submodules: recursive
          ref: main
      
      - name: Install Deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build libgtk-3-dev libayatana-appindicator3-dev liblzma-dev libkeybinder-3.0-dev libsecret-1-dev
          
      - uses: actions/setup-go@v5
        with: {go-version: '1.24.0'}
      - uses: subosito/flutter-action@v2
        with: {channel: 'stable', cache: true}
          
      - name: Build
        run: |
          # 1. 先给插件生成代码
          cd plugins/chatwoot_sdk
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          cd ../..
          
          # 2. 根目录常规操作
          flutter pub get
          flutter pub run build_runner build --delete-conflicting-outputs
          dart run scripts/update_oem.dart --appName="${{ github.event.inputs.appName }}" --binaryName="${{ github.event.inputs.binaryName }}" --packageName="com.tianque.app" --ossUrl="https://example.com" --imgbbApiKey="test"
          dart setup.dart linux --out core --arch amd64
          flutter build linux --release
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Linux-Test-Build
          path: build/linux/x64/release/bundle/*
